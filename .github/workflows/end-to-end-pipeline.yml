name: End-to-End CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: echo "Build completed"

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Test
        run: echo "Tests passed"

  docker-build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t my-app:${{ github.run_number }} .

  docker-push:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Docker Login
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
          PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$PASSWORD" | docker login -u "$USERNAME" --password-stdin || true
          echo "Docker push simulated"

  upload-artifact:
    needs: docker-push
    runs-on: ubuntu-latest

    steps:
      - name: Create Report
        run: |
          echo "Pipeline completed successfully" > report.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: report.txt
